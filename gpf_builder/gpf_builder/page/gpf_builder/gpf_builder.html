<div class="gpf-builder-wrapper">
	<div class="gpf-toolbar">
		<div class="toolbar-section">
			<button class="btn btn-primary btn-sm" id="btn-upload-pdf">
				<i class="fa fa-upload"></i> PDF
			</button>
			<button class="btn btn-default btn-sm" id="btn-pdf-text">
				<i class="fa fa-align-left"></i> PDF Text
			</button>
			<button class="btn btn-default btn-sm" id="btn-save">
				<i class="fa fa-save"></i> Save
			</button>
			<button class="btn btn-default btn-sm" id="btn-preview">
				<i class="fa fa-eye"></i> Preview
			</button>
			<button class="btn btn-default btn-sm" id="btn-output">
				<i class="fa fa-code"></i> Output
			</button>
		</div>
		<div class="toolbar-section">
			<button class="btn btn-default btn-sm" data-add-block="Static Text">Text</button>
			<button class="btn btn-default btn-sm" data-add-block="Dynamic Field">Field</button>
			<button class="btn btn-default btn-sm" data-add-block="OCR Text">OCR Text</button>
			<button class="btn btn-default btn-sm" data-add-block="Image">Image</button>
			<button class="btn btn-default btn-sm" data-add-block="Branding">Branding</button>
			<button class="btn btn-default btn-sm" id="btn-duplicate">Duplicate</button>
			<button class="btn btn-default btn-sm" id="btn-reset">Reset</button>
			<button class="btn btn-danger btn-sm" id="btn-delete">Delete</button>
		</div>
		<div class="toolbar-section">
			<button class="btn btn-default btn-sm" id="btn-fullscreen">
				<i class="fa fa-expand"></i> Fullscreen
			</button>
			<button class="btn btn-default btn-sm" id="btn-v-ruler">V Ruler</button>
			<button class="btn btn-default btn-sm" id="btn-h-ruler">H Ruler</button>
			<button class="btn btn-default btn-sm" id="btn-clear-rulers">Clear Rulers</button>
			<button class="btn btn-default btn-sm" id="btn-ocr">
				<i class="fa fa-magic"></i> Run OCR
			</button>
			<button class="btn btn-warning btn-sm" id="btn-edit" style="display:none;">Return</button>
			<button class="btn btn-success btn-sm" id="btn-finalize">Finalize</button>
		</div>
	</div>

	<div class="gpf-status-bar">
		<span id="gpf-setup-status">Loading setup...</span>
		<span id="gpf-pdf-status"></span>
	</div>

	<div class="gpf-main-container">
		<div class="gpf-canvas-column">
			<div id="gpf-canvas-container"></div>
		</div>
		<div class="gpf-property-panel">
			<div class="panel-header" data-collapse-target="#gpf-source-doc-panel">
				<span>Source Document</span>
				<i class="fa fa-chevron-up"></i>
			</div>
			<div id="gpf-source-doc-panel" class="gpf-source-doc-panel">
				<div id="gpf-target-doctype-control"></div>
				<div id="gpf-source-doc-control"></div>
				<div class="text-muted gpf-source-doc-help"></div>
			</div>
			<div class="panel-header" data-collapse-target="#gpf-properties-content">
				<span>Properties</span>
				<i class="fa fa-chevron-up"></i>
			</div>
			<div id="gpf-properties-content">
				<div class="text-muted text-center gpf-empty-state">Select a block to edit.</div>
			</div>
			<div class="panel-header" data-collapse-target="#gpf-field-list">
				<span>Fields</span>
				<i class="fa fa-chevron-up"></i>
			</div>
			<div id="gpf-field-list" class="gpf-field-list"></div>
			<div class="panel-header" data-collapse-target="#gpf-ocr-list">
				<span>OCR Results</span>
				<i class="fa fa-chevron-up"></i>
			</div>
			<div id="gpf-ocr-list" class="gpf-ocr-list"></div>
		</div>
	</div>
</div>
